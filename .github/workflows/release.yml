name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: cyweb-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: cyweb-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: cyweb-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: cyweb-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cyweb dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cyweb-linux-amd64/cyweb-linux-amd64
            artifacts/cyweb-linux-arm64/cyweb-linux-arm64
            artifacts/cyweb-darwin-amd64/cyweb-darwin-amd64
            artifacts/cyweb-darwin-arm64/cyweb-darwin-arm64

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cyweb-linux-amd64
          path: dist
      - name: Build and push Docker image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          chmod +x dist/cyweb-linux-amd64
          cat > Dockerfile.release <<'DOCKERFILE'
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y ca-certificates && rm -rf /var/lib/apt/lists/*
          COPY dist/cyweb-linux-amd64 /usr/local/bin/cyweb
          ENTRYPOINT ["cyweb"]
          DOCKERFILE
          docker build -f Dockerfile.release -t ghcr.io/cybrium-ai/cyweb:${{ github.ref_name }} -t ghcr.io/cybrium-ai/cyweb:latest .
          docker push ghcr.io/cybrium-ai/cyweb:${{ github.ref_name }}
          docker push ghcr.io/cybrium-ai/cyweb:latest
