  - id: CYWEB-NET-001
    title: Portainer management UI
    severity: high
    category: Exposed Services
    description: Portainer Docker management UI is publicly accessible.
    cwe: CWE-284
    remediation: Restrict Portainer to internal networks.
    paths: ["/#!/auth", "/api/status"]
    match_status: [200]
    match_body: "(?i)portainer"

  - id: CYWEB-NET-002
    title: Traefik dashboard accessible
    severity: medium
    category: Exposed Services
    description: Traefik reverse proxy dashboard is publicly accessible.
    cwe: CWE-200
    remediation: Restrict dashboard to internal networks. Enable authentication.
    paths: ["/dashboard/", "/api/rawdata"]
    match_status: [200]
    match_body: "(?i)traefik"

  - id: CYWEB-NET-003
    title: phpPgAdmin exposed
    severity: high
    category: Exposed Services
    description: phpPgAdmin PostgreSQL management tool is publicly accessible.
    cwe: CWE-284
    remediation: Restrict phpPgAdmin access to internal networks.
    paths: ["/phppgadmin/", "/pgadmin/"]
    match_status: [200]
    match_body: "(?i)(phppgadmin|pgadmin)"

  - id: CYWEB-NET-004
    title: Solr admin panel accessible
    severity: high
    category: Exposed Services
    description: Apache Solr admin interface is publicly accessible.
    cwe: CWE-284
    remediation: Restrict Solr admin to internal networks.
    paths: ["/solr/", "/solr/admin/"]
    match_status: [200]
    match_body: "(?i)solr"

  - id: CYWEB-NET-005
    title: MongoDB Express accessible
    severity: critical
    category: Exposed Services
    description: MongoDB Express web UI is publicly accessible without authentication.
    cwe: CWE-284
    remediation: Remove mongo-express from production. Restrict access.
    paths: ["/"]
    match_status: [200]
    match_body: "(?i)mongo express"

  # ── Miscellaneous ──────────────────────────────────────────────────
  - id: CYWEB-MIS-010
    title: Error page reveals framework version
    severity: low
    category: Information Disclosure
    description: Error page reveals the framework and version in use.
    cwe: CWE-200
    remediation: Configure custom error pages.
    paths: ["/nonexistent-cyweb-probe"]
    match_status: [404]
    match_body: "(?i)(express|django|flask|laravel|spring|rails|asp\\.net|version)"

  - id: CYWEB-MIS-011
    title: WSDL file exposed
    severity: low
    category: Information Disclosure
    description: WSDL file reveals SOAP API endpoints and operations.
    cwe: CWE-200
    remediation: Restrict access to WSDL files.
    paths: ["/service.wsdl", "/ws?wsdl", "/api?wsdl"]
    match_status: [200]
    match_body: "(?i)(wsdl|definitions|portType)"

  - id: CYWEB-MIS-012
    title: Webpack stats file exposed
    severity: medium
    category: Information Disclosure
    description: Webpack stats JSON reveals all module paths and bundle structure.
    cwe: CWE-540
    remediation: Remove stats.json from production builds.
    paths: ["/stats.json", "/webpack-stats.json"]
    match_status: [200]
    match_body: "(?i)(chunks|modules|assets)"

  - id: CYWEB-MIS-013
    title: Node.js heapdump accessible
    severity: critical
    category: Information Disclosure
    description: Node.js heap snapshot is downloadable, containing secrets from memory.
    cwe: CWE-200
    remediation: Remove heapdump files from webroot.
    paths: ["/heapdump", "/heapdump.heapsnapshot"]
    match_status: [200]
    not_match_body: "(?i)(<!DOCTYPE|<html)"

  - id: CYWEB-MIS-014
    title: IDE project files exposed
    severity: low
    category: Information Disclosure
    description: IDE project files reveal project structure and configuration.
    cwe: CWE-200
    remediation: Block access to IDE files (.idea, .vscode).
    paths: ["/.idea/workspace.xml", "/.vscode/settings.json", "/.project"]
    match_status: [200]
    match_body: "(?i)(component|setting|project)"
